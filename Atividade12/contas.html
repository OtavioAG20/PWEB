<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas</title>
</head>
<body>
    <h2>Conta Corrente</h2>
    <input type="text" id="nomeCorrente" placeholder="Nome do Correntista">
    <br>
    <input type="text" id="bancoCorrente" placeholder="Banco">
    <br>
    <input type="text" id="numCorrente" placeholder="Número da Conta">
    <br>
    <input type="number" id="saldoCorrente" placeholder="Saldo">
    <br>
    <input type="number" id="saldoEspecial" placeholder="Saldo Especial">
    <br>
    <br>
    <button onclick="mostrarCorrente()">Mostrar Dados</button>
    <br>
    <br>
    <h2>Conta Poupança</h2>
    <input type="text" id="nomePoupanca" placeholder="Nome do Corrrentista">
    <br>
    <input type="text" id="bancoPoupanca" placeholder="Banco">
    <br>
    <input type="text" id="numPoupanca" placeholder="Número da Conta">
    <br>
    <input type="number" id="saldoPoupanca" placeholder="Saldo">
    <br>
    <input type="number" id="juros" placeholder="Juros">
    <br>
    <input type="date" id="vencimento">
    <br>
    <br>
    <button onclick="mostrarPoupanca()">Mostrar Dados</button>

    <script src="./contas.js"></script>
</body>
</html>
